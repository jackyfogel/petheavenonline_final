{% extends "base.html" %}
{% block title %}Reset Password | PetHeavenOnline{% endblock %}
{% block robots %}<meta name="robots" content="noindex">{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="auth-inner">
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-intro">Enter your email and we'll send you a reset link.</p>

    <form class="auth-form" method="post">
      {% csrf_token %}
      <div class="auth-field-group">
        <label class="auth-label" for="id_email">Email</label>
        <input class="auth-input" type="email" name="email" id="id_email" autocomplete="email" required>
      </div>
      <button type="submit" class="auth-btn">Send reset link</button>
    </form>

    <div class="auth-switch">
      Remember your password? <a href="/login/" class="auth-link">Log in</a>
    </div>
  </div>
</main>
{% endblock %}
