databases:
  - name: petheavenonline-db
    databaseName: petheavenonline
    user: petheavenonline
    plan: free

services:
  - type: web
    name: petheavenonline
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: petheavenonline-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: False
